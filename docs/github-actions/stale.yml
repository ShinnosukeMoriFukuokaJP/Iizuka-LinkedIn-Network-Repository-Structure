name: Mark Stale Issues

on:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 30 days. It will be closed in 7 days unless there is new activity. Thank you for contributing to the Iizuka LinkedIn Network!'
          stale-pr-message: 'This PR has been inactive for 30 days. Please update it or it may be closed. Thank you!'
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,roadmap,help wanted'
