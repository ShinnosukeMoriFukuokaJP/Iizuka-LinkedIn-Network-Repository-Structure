name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: context.payload.pull_request.user.login
            });
            if (prs.length === 1) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Welcome to **Iizuka LinkedIn Network**! Thank you for your first contribution to the Chikuho Region's open knowledge hub.\n\nA maintainer will review your PR soon. In the meantime, consider joining our [LinkedIn Group](https://www.linkedin.com/groups/) and introducing yourself!\n\n*Iizuka LinkedIn Network · Chikuho Region · Fukuoka Prefecture · Japan*`
              });
            }
