name: Generate LinkedIn Posts

on:
  push:
    branches: [ main ]
    paths:
      - 'input/travel-record.md'

jobs:
  generate:
    runs-on: ubuntu-latest
    name: Generate EN + JA LinkedIn Posts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate posts
        run: python3 scripts/generate_posts.py

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/post-en.md output/post-ja.md
          if git diff --cached --quiet; then
            echo "変更なし — スキップ"
          else
            git commit -m "Auto-generate LinkedIn posts from travel-record.md [skip ci]"
            git push
          fi
