name: Security Scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ① シークレット検出（重要）
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      # ② コード静的解析
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
