name: Claude × HuggingFace AI Pipeline

on:
  push:
    branches: [main]
    paths:
      - "inputs/**"
      - "scripts/**"
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      prompt:
        description: "HFモデルへの入力テキスト"
        required: true
        default: "Summarize the Iizuka LinkedIn Network project"
      model:
        description: "使用するHFモデルID"
        required: false
        default: "mistralai/Mistral-7B-Instruct-v0.3"

jobs:
  hf-inference:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'ai-run')

    outputs:
      result: ${{ steps.hf.outputs.result }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run HuggingFace Inference
        id: hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PROMPT: ${{ github.event.inputs.prompt || github.event.issue.title }}
          MODEL: ${{ github.event.inputs.model || 'mistralai/Mistral-7B-Instruct-v0.3' }}
        run: python scripts/hf_inference.py

      - name: Save result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-output-${{ github.run_number }}
          path: outputs/result.json

  post-issue-comment:
    runs-on: ubuntu-latest
    needs: hf-inference
    if: github.event_name == 'issues'

    steps:
      - name: Post AI result to Issue
        uses: actions/github-script@v9
        with:
          script: |
            const result = `${{ needs.hf-inference.outputs.result }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Pipeline Result\n\n${result}\n\n---\n*Generated by Claude × HuggingFace Pipeline*`
            });

  update-readme:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate README section
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit updated README
        run: |
          git config user.name "AI Pipeline Bot"
          git config user.email "ai-bot@noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README via AI pipeline [skip ci]"
          git push
