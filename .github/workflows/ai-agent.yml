name: AI Dev Agent

on:
  issues:
    types: [opened]

jobs:
  ai-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai gitpython

      - name: Run AI Planner
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python agent/planner.py

      - name: Commit & Create PR
        run: |
          git config user.name "ai-agent"
          git config user.email "ai@agent.com"
          git checkout -b ai-fix-${{ github.run_id }}
          git add .
          git commit -m "AI generated fix"
          git push origin HEAD

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "AI Auto PR"
          body: "Generated by AI Dev OS"
