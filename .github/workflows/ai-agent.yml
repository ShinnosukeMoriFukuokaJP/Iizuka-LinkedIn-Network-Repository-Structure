name: "🤖 Claude AI Agent"

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  claude-agent:
    name: "Claude Issue Responder"
    runs-on: ubuntu-latest

    if: |
      github.event.label.name == 'ai-agent' &&
      github.repository_owner == 'ShinnosukeMoriFukuokaJP'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write issue context to JSON
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const context = {
              issue_number: String(context.issue.number),
              issue_title:  context.payload.issue.title  || "",
              issue_body:   context.payload.issue.body   || "",
              issue_author: context.payload.issue.user.login || "",
              repo:         context.repo.owner + "/" + context.repo.repo
            };
            fs.writeFileSync('/tmp/issue_context.json', JSON.stringify(context));
            core.info("Issue context written to /tmp/issue_context.json");

      - name: Run Claude Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_CONTEXT_PATH: /tmp/issue_context.json
        run: python .github/scripts/claude_agent.py
