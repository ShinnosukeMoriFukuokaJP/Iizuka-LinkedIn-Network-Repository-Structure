# =============================================================
# security-pr.yml
# Self-Healing DevSecOps Pipeline — PR Security Gate
# PRが作成/更新されるたびにリアルタイムでセキュリティチェック実行
# HIGHまたはCRITICALがあればPRにブロッキングコメントを追加
# =============================================================
name: 🛡️ PR Security Gate

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

# 最小権限
permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

jobs:

  # ─────────────────────────────────────────
  # 🔒 OWNER-ONLY LOCK — 所有者以外は即時停止
  # ─────────────────────────────────────────
  owner-check:
    name: 🔒 Owner Identity Verification
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.verify.outputs.authorized }}
    steps:
      - name: Verify actor is repository owner
        id: verify
        env:
          REQUIRED_OWNER: "ShinnosukeMoriFukuokaJP"
        run: |
          ACTOR="${{ github.actor }}"
          REPO_OWNER="${{ github.repository_owner }}"

          echo "Actor     : $ACTOR"
          echo "Repo owner: $REPO_OWNER"
          echo "Required  : $REQUIRED_OWNER"

          # スケジュール実行はActorが github-actions[bot] になる
          # そのためリポジトリオーナーで最終判定
          if [ "$ACTOR" != "$REQUIRED_OWNER" ] && \
             [ "$ACTOR" != "github-actions[bot]" ]; then
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "::warning::🚫 UNAUTHORIZED: $ACTOR is not allowed to run this workflow."
            exit 0
          fi

          if [ "$REPO_OWNER" != "$REQUIRED_OWNER" ]; then
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "::warning::🚫 UNAUTHORIZED: Repository owner $REPO_OWNER is not $REQUIRED_OWNER"
            exit 0
          fi

          echo "authorized=true" >> $GITHUB_OUTPUT
          echo "✅ Authorization passed for $ACTOR"

  # ─────────────────────────────────────────
  # JOB 1: 変更ファイルのみをスキャン（高速）
  # ─────────────────────────────────────────
  pr-security-scan:
    name: 🔍 PR Delta Security Scan
    needs: [owner-check]
    if: needs.owner-check.outputs.authorized == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # draft PRはスキップ（ready_for_reviewで再実行）

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46.0.1
        with:
          separator: '\n'
          files_ignore: |
            *.md
            *.txt
            .github/**
            docs/**

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install semgrep --quiet

      - name: Run Semgrep on changed files only
        id: semgrep-pr
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          mkdir -p /tmp/pr-scan

          # 変更ファイルのみをスキャン対象に
          FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          
          echo "Scanning changed files:"
          echo "$FILES"

          # ファイルリストをスペース区切りに変換
          FILES_LIST=$(echo "$FILES" | tr '\n' ' ')

          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --json \
            --output /tmp/pr-scan/semgrep-pr.json \
            --no-error \
            --quiet \
            $FILES_LIST 2>/dev/null || true

          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --sarif \
            --output /tmp/pr-scan/semgrep-pr.sarif \
            --no-error \
            --quiet \
            $FILES_LIST 2>/dev/null || true

          echo "PR scan complete"

      - name: Run Gitleaks on PR diff
        id: gitleaks-pr
        run: |
          # PR差分のみをシークレットスキャン
          git diff origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }} \
            > /tmp/pr-scan/pr.diff 2>/dev/null || true
          
          # Gitleaksでdiffをスキャン
          docker run --rm \
            -v /tmp/pr-scan:/scan \
            zricethezav/gitleaks:latest \
            detect \
            --source /scan \
            --report-format json \
            --report-path /scan/gitleaks-pr.json \
            --no-git \
            2>/dev/null || true
            
          echo "Gitleaks PR scan complete"
        continue-on-error: true

      - name: Analyze PR scan results
        id: analyze
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          scan_dir = '/tmp/pr-scan'
          
          # Semgrep結果解析
          semgrep_findings = {"HIGH": [], "MEDIUM": [], "LOW": [], "CRITICAL": []}
          
          semgrep_path = f"{scan_dir}/semgrep-pr.json"
          if os.path.exists(semgrep_path):
              try:
                  with open(semgrep_path) as f:
                      data = json.load(f)
                  
                  for r in data.get('results', []):
                      sev = r.get('extra', {}).get('severity', 'INFO')
                      level = 'HIGH' if sev == 'ERROR' else 'MEDIUM' if sev == 'WARNING' else 'LOW'
                      semgrep_findings[level].append({
                          "check_id": r.get('check_id', ''),
                          "path": r.get('path', ''),
                          "line": r.get('start', {}).get('line', 0),
                          "message": r.get('extra', {}).get('message', ''),
                          "code": r.get('extra', {}).get('lines', '')[:200]  # 最大200文字
                      })
              except Exception as e:
                  print(f"Error parsing Semgrep results: {e}")
          
          # Gitleaks結果解析
          secrets_found = []
          gitleaks_path = f"{scan_dir}/gitleaks-pr.json"
          if os.path.exists(gitleaks_path):
              try:
                  with open(gitleaks_path) as f:
                      leaks = json.load(f)
                  if isinstance(leaks, list):
                      for leak in leaks:
                          secrets_found.append({
                              "rule": leak.get('RuleID', ''),
                              "file": leak.get('File', ''),
                              "line": leak.get('StartLine', 0),
                              # シークレット値は絶対にログに出力しない
                              "secret_masked": "***MASKED***"
                          })
              except Exception as e:
                  print(f"Error parsing Gitleaks results: {e}")
          
          result = {
              "semgrep": semgrep_findings,
              "secrets": secrets_found,
              "has_critical": len(semgrep_findings['CRITICAL']) > 0,
              "has_high": len(semgrep_findings['HIGH']) > 0 or len(secrets_found) > 0,
              "has_medium": len(semgrep_findings['MEDIUM']) > 0,
              "total": sum(len(v) for v in semgrep_findings.values()) + len(secrets_found)
          }
          
          with open(f"{scan_dir}/pr-analysis.json", 'w') as f:
              json.dump(result, f, indent=2, ensure_ascii=False)
          
          # GitHub Actions outputs
          gha_output = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(gha_output, 'a') as f:
              f.write(f"has_critical={str(result['has_critical']).lower()}\n")
              f.write(f"has_high={str(result['has_high']).lower()}\n")
              f.write(f"has_medium={str(result['has_medium']).lower()}\n")
              f.write(f"total={result['total']}\n")
          
          print(f"Analysis: {result['total']} total findings")
          print(f"  CRITICAL: {len(semgrep_findings['CRITICAL'])}")
          print(f"  HIGH: {len(semgrep_findings['HIGH'])}")
          print(f"  Secrets: {len(secrets_found)}")
          PYEOF

      - name: Upload PR scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/pr-scan/semgrep-pr.sarif
          category: semgrep-pr
        continue-on-error: true

      - name: Post PR review comment
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            let analysis = {};
            try {
              analysis = JSON.parse(fs.readFileSync('/tmp/pr-scan/pr-analysis.json', 'utf8'));
            } catch(e) {
              console.log('No analysis data:', e.message);
              return;
            }
            
            const total = analysis.total || 0;
            const hasHigh = analysis.has_high || false;
            const hasCritical = analysis.has_critical || false;
            const secrets = analysis.secrets || [];
            const semgrep = analysis.semgrep || {};
            
            let statusEmoji = '✅';
            let statusText = 'PASSED';
            let reviewEvent = 'APPROVE';
            
            if (hasCritical || secrets.length > 0) {
              statusEmoji = '🚨';
              statusText = 'BLOCKED — CRITICAL issues or Secrets detected';
              reviewEvent = 'REQUEST_CHANGES';
            } else if (hasHigh) {
              statusEmoji = '⚠️';
              statusText = 'REVIEW REQUIRED — HIGH severity issues detected';
              reviewEvent = 'REQUEST_CHANGES';
            } else if (total > 0) {
              statusEmoji = 'ℹ️';
              statusText = 'PASSED with warnings (MEDIUM/LOW only)';
              reviewEvent = 'COMMENT';
            }
            
            // セキュリティ問題の詳細（シークレット値はマスク）
            let secretsSection = '';
            if (secrets.length > 0) {
              secretsSection = `
            ### 🔑 Secrets Detected (${secrets.length})
            > ⛔ **Secrets found in diff! Remove immediately and rotate credentials.**
            
            ${secrets.map(s => `- \`${s.file}:${s.line}\` — Rule: \`${s.rule}\` (value masked)`).join('\n')}
            `;
            }
            
            let highSection = '';
            const highFindings = semgrep.HIGH || [];
            if (highFindings.length > 0) {
              highSection = `
            ### 🟠 HIGH Severity Issues (${highFindings.length})
            ${highFindings.map(f => `
            **\`${f.path}:${f.line}\`** — \`${f.check_id}\`
            > ${f.message}
            \`\`\`
            ${f.code}
            \`\`\`
            `).join('\n')}
            `;
            }
            
            let medSection = '';
            const medFindings = semgrep.MEDIUM || [];
            if (medFindings.length > 0) {
              medSection = `
            ### 🟡 MEDIUM Severity Issues (${medFindings.length})
            ${medFindings.map(f => `- \`${f.path}:${f.line}\` — ${f.message}`).join('\n')}
            `;
            }
            
            const body = `## ${statusEmoji} Security Gate: ${statusText}
            
            | Severity | Count | Action |
            |----------|-------|--------|
            | 🔴 Secrets | ${secrets.length} | ⛔ Block & Rotate |
            | 🔴 CRITICAL | ${(semgrep.CRITICAL || []).length} | ⛔ Manual Fix Required |
            | 🟠 HIGH | ${highFindings.length} | 🤖 Auto-fix PR will be generated |
            | 🟡 MEDIUM | ${medFindings.length} | 👀 Review Recommended |
            | 🔵 LOW | ${(semgrep.LOW || []).length} | 📝 Log Only |
            
            ${secretsSection}
            ${highSection}
            ${medSection}
            
            ---
            
            ${hasCritical || secrets.length > 0 
              ? '> ⛔ **This PR cannot be merged until CRITICAL issues and secrets are resolved.**'
              : hasHigh 
                ? '> ⚠️ **Auto-fix PR will be created. Review before merging.**'
                : '> ✅ **No blocking security issues found.**'
            }
            
            _Scanned at: ${new Date().toISOString()} | [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`;
            
            // PR Reviewとして投稿（コメントより権威性が高い）
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: body,
                event: reviewEvent
              });
            } catch(e) {
              // フォールバック: 通常コメント
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }

      - name: Set check status
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const hasHigh = '${{ steps.analyze.outputs.has_high }}' === 'true';
            const hasCritical = '${{ steps.analyze.outputs.has_critical }}' === 'true';
            const total = parseInt('${{ steps.analyze.outputs.total }}') || 0;
            
            // CRITICAL or secrets → fail the check
            // HIGH → warning (doesn't block merge by itself, PR review does)
            // MEDIUM/LOW → success
            const conclusion = hasCritical ? 'failure' : 
                              hasHigh ? 'action_required' : 
                              'success';
            
            console.log(`Security gate: ${conclusion} (total: ${total} findings)`);
            
            if (hasCritical) {
              core.setFailed(`Security gate FAILED: CRITICAL issues detected (${total} total findings)`);
            }

  # ─────────────────────────────────────────
  # JOB 2: 依存関係チェック（package.json / requirements.txt）
  # ─────────────────────────────────────────
  dependency-check:
    name: 📦 Dependency Vulnerability Check
    needs: [owner-check]
    if: needs.owner-check.outputs.authorized == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check for dependency files
        id: dep-files
        run: |
          HAS_NPM=false
          HAS_PIP=false
          
          [ -f "package.json" ] && HAS_NPM=true
          [ -f "requirements.txt" ] || [ -f "requirements*.txt" ] && HAS_PIP=true
          
          echo "has_npm=$HAS_NPM" >> $GITHUB_OUTPUT
          echo "has_pip=$HAS_PIP" >> $GITHUB_OUTPUT

      - name: npm audit
        if: steps.dep-files.outputs.has_npm == 'true'
        run: |
          npm audit --json --audit-level=high 2>/dev/null | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('vulnerabilities', {})
          high = sum(1 for v in vulns.values() if v.get('severity') in ['high', 'critical'])
          print(f'npm audit: {high} high/critical vulnerabilities')
          " || echo "npm audit skipped"
        continue-on-error: true

      - name: pip-audit
        if: steps.dep-files.outputs.has_pip == 'true'
        run: |
          pip install pip-audit --quiet
          pip-audit --format json 2>/dev/null | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('dependencies', [])
          print(f'pip-audit: {len(vulns)} vulnerable packages')
          " || echo "pip-audit skipped"
        continue-on-error: true
