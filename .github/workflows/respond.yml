name: "⚡ Response Layer — Security OS"

on:
  workflow_run:
    workflows: ["📊 Analyze Layer — Security OS"]
    types: [completed]
  workflow_dispatch:
    inputs:
      risk_label:
        description: "Risk label (CRITICAL/HIGH/MEDIUM/LOW)"
        required: true
        type: choice
        options: [CRITICAL, HIGH, MEDIUM, LOW]
      action_required:
        description: "Action type"
        required: true
        type: choice
        options: [pipeline_fail, pr_block, pr_comment, log_only]
      source_run_id:
        description: "Source run ID for artifact download"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  # ─────────────────────────────────────────
  # R-1: Resolve analysis context
  # ─────────────────────────────────────────
  resolve-context:
    name: "R-1 | Resolve Analysis Context"
    runs-on: ubuntu-latest
    outputs:
      risk_label: ${{ steps.ctx.outputs.risk_label }}
      action_required: ${{ steps.ctx.outputs.action_required }}
      source_run_id: ${{ steps.ctx.outputs.source_run_id }}
      risk_score: ${{ steps.ctx.outputs.risk_score }}
    steps:
      - name: Resolve from trigger
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            # We'll read from artifacts below
            echo "risk_label=UNKNOWN" >> $GITHUB_OUTPUT
            echo "action_required=log_only" >> $GITHUB_OUTPUT
            echo "risk_score=0" >> $GITHUB_OUTPUT
          else
            echo "risk_label=${{ inputs.risk_label }}" >> $GITHUB_OUTPUT
            echo "action_required=${{ inputs.action_required }}" >> $GITHUB_OUTPUT
            echo "source_run_id=${{ inputs.source_run_id }}" >> $GITHUB_OUTPUT
            echo "risk_score=0" >> $GITHUB_OUTPUT
          fi

      - name: Download analysis report
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.ctx.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./analysis
        continue-on-error: true

      - name: Parse analysis report
        id: parse
        run: |
          REPORT=$(find ./analysis -name "analysis-report.json" 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            echo "risk_label=$(jq -r '.risk_label' "$REPORT")" >> $GITHUB_OUTPUT
            echo "action_required=$(jq -r '.action_required' "$REPORT")" >> $GITHUB_OUTPUT
            echo "risk_score=$(jq -r '.risk_score' "$REPORT")" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────
  # R-2: Create GitHub Issue (Alert Log)
  # ─────────────────────────────────────────
  create-issue:
    name: "R-2 | Create Security Issue"
    runs-on: ubuntu-latest
    needs: resolve-context
    if: |
      needs.resolve-context.outputs.action_required == 'pipeline_fail' ||
      needs.resolve-context.outputs.action_required == 'pr_block' ||
      needs.resolve-context.outputs.action_required == 'pr_comment'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download findings
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ needs.resolve-context.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./findings
        continue-on-error: true

      - name: Build issue body
        id: build_body
        run: |
          FINDINGS_FILE=$(find ./findings -name "findings.json" 2>/dev/null | head -1)
          RISK_LABEL="${{ needs.resolve-context.outputs.risk_label }}"
          RISK_SCORE="${{ needs.resolve-context.outputs.risk_score }}"
          ACTION="${{ needs.resolve-context.outputs.action_required }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ needs.resolve-context.outputs.source_run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Severity emoji
          case "$RISK_LABEL" in
            CRITICAL) EMOJI="🚨" ;;
            HIGH)     EMOJI="🔴" ;;
            MEDIUM)   EMOJI="🟡" ;;
            *)        EMOJI="🟢" ;;
          esac

          cat > issue_body.md << MDEOF
          ## ${EMOJI} Security OS Alert — ${RISK_LABEL}

          | Field | Value |
          |-------|-------|
          | **Severity** | ${RISK_LABEL} |
          | **Risk Score** | ${RISK_SCORE} |
          | **Action Taken** | \`${ACTION}\` |
          | **Detected At** | ${TIMESTAMP} |
          | **Workflow Run** | [View Run](${RUN_URL}) |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |

          ## Findings Summary

          MDEOF

          if [ -n "$FINDINGS_FILE" ]; then
            python3 << PYEOF >> issue_body.md
          import json
          with open("$FINDINGS_FILE") as f:
              findings = json.load(f)
          for sev in ["CRITICAL", "HIGH", "MEDIUM", "LOW"]:
              items = findings.get(sev, [])
              if items:
                  print(f"\n### {sev} ({len(items)} findings)\n")
                  for i, item in enumerate(items[:5], 1):
                      print(f"{i}. **{item['tool']}** — `{item['rule_id']}`")
                      print(f"   - File: `{item['file']}:{item['line']}`")
                      print(f"   - {item['message'][:150]}")
                      print(f"   - Fixable: {'✅' if item.get('fixable') else '❌'}")
                  if len(items) > 5:
                      print(f"\n> ... and {len(items)-5} more. See artifacts for full report.")
          PYEOF
          else
            echo "\n> Findings file not available. Check workflow artifacts." >> issue_body.md
          fi

          cat >> issue_body.md << MDEOF2

          ## Next Steps

          - [ ] Review full findings in [workflow artifacts](${RUN_URL})
          - [ ] Check auto-generated fix PR (if applicable)
          - [ ] Verify remediation before merging
          - [ ] Close this issue after fix is merged

          ---
          *Generated by Security OS — Respond Layer | Run \`${{ github.run_id }}\`*
          MDEOF2

          echo "body_file=issue_body.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[${{ needs.resolve-context.outputs.risk_label }}] Security Scan Alert — ${{ github.ref_name }} — ${{ github.run_id }}"
          content-filepath: issue_body.md
          labels: |
            security
            ${{ needs.resolve-context.outputs.risk_label == 'CRITICAL' && 'critical' || needs.resolve-context.outputs.risk_label == 'HIGH' && 'high-priority' || 'medium-priority' }}
            automated-alert

  # ─────────────────────────────────────────
  # R-3: Auto Fix Branch + PR (HIGH/CRITICAL)
  # ─────────────────────────────────────────
  create-fix-pr:
    name: "R-3 | Auto Fix Branch & PR"
    runs-on: ubuntu-latest
    needs: resolve-context
    if: |
      needs.resolve-context.outputs.action_required == 'pipeline_fail' ||
      needs.resolve-context.outputs.action_required == 'pr_block'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download findings
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ needs.resolve-context.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./findings
        continue-on-error: true

      - name: Configure git
        run: |
          git config user.name "Security OS Bot"
          git config user.email "security-os@noreply.github.com"

      - name: Apply safe auto-fixes
        id: autofix
        run: |
          BRANCH="security/auto-fix-${{ github.run_id }}"
          git checkout -b "$BRANCH"

          FIXED=0
          FINDINGS_FILE=$(find ./findings -name "findings.json" 2>/dev/null | head -1)

          if [ -n "$FINDINGS_FILE" ]; then
            python3 << 'PYEOF'
          import json
          import os
          import re
          import glob

          with open("$FINDINGS_FILE") as f:
              findings = json.load(f)

          fixed_count = 0
          fix_log = []

          # Pattern: hardcoded secrets → env reference
          SECRET_PATTERNS = [
              (r'(password\s*=\s*)["\'][^"\']{6,}["\']', r'\1os.environ.get("PASSWORD", "")'),
              (r'(api_key\s*=\s*)["\'][^"\']{6,}["\']', r'\1os.environ.get("API_KEY", "")'),
              (r'(secret\s*=\s*)["\'][^"\']{6,}["\']', r'\1os.environ.get("SECRET", "")'),
              (r'(token\s*=\s*)["\'][^"\']{6,}["\']', r'\1os.environ.get("TOKEN", "")'),
          ]

          fixable_items = [
              item for sev in ["CRITICAL", "HIGH"]
              for item in findings.get(sev, [])
              if item.get("fixable") and item.get("file") != "unknown"
          ]

          for item in fixable_items[:10]:  # Safety limit
              filepath = item["file"]
              if not os.path.exists(filepath):
                  continue
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      content = f.read()
                  original = content
                  for pattern, replacement in SECRET_PATTERNS:
                      content = re.sub(pattern, replacement, content, flags=re.IGNORECASE)
                  if content != original:
                      with open(filepath, "w", encoding="utf-8") as f:
                          f.write(content)
                      fix_log.append(f"Fixed: {filepath}")
                      fixed_count += 1
              except Exception as e:
                  fix_log.append(f"Skip {filepath}: {e}")

          print(f"FIXED={fixed_count}")
          with open("fix_log.txt", "w") as f:
              f.write("\n".join(fix_log))
          PYEOF
          fi

          # Always create a security advisory file
          cat > SECURITY_SCAN_RESULT.md << SCANEOF
          # Security Scan — Auto-Fix Proposal

          **Generated:** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Severity:** ${{ needs.resolve-context.outputs.risk_label }}
          **Risk Score:** ${{ needs.resolve-context.outputs.risk_score }}
          **Branch:** $BRANCH
          **Source Run:** ${{ needs.resolve-context.outputs.source_run_id }}

          ## Summary

          This PR was automatically created by the Security OS Response Layer.
          It contains safe, automated fixes for detected findings.

          **⚠️ Do NOT merge without human review.**

          See the linked Issue and workflow artifacts for full details.
          SCANEOF

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "security: auto-fix findings from scan run ${{ github.run_id }}

          Severity: ${{ needs.resolve-context.outputs.risk_label }}
          Risk Score: ${{ needs.resolve-context.outputs.risk_score }}
          Source: https://github.com/${{ github.repository }}/actions/runs/${{ needs.resolve-context.outputs.source_run_id }}

          ⚠️ Human review required before merging."
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Fix PR
        if: steps.autofix.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.autofix.outputs.branch }}
          base: main
          title: "🔒 [Security OS] Auto-fix: ${{ needs.resolve-context.outputs.risk_label }} findings — Run ${{ github.run_id }}"
          body: |
            ## 🔒 Security OS — Automated Fix Proposal

            > **⚠️ This PR requires human review and approval before merging.**
            > Auto-merge is disabled by Security OS policy.

            ### Detection Summary
            | Field | Value |
            |-------|-------|
            | Severity | **${{ needs.resolve-context.outputs.risk_label }}** |
            | Risk Score | ${{ needs.resolve-context.outputs.risk_score }} |
            | Source Run | [View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ needs.resolve-context.outputs.source_run_id }}) |

            ### What was changed
            - Hardcoded secrets replaced with environment variable references
            - `SECURITY_SCAN_RESULT.md` added with scan summary

            ### What to do
            1. Review each changed file carefully
            2. Replace placeholder env var names with actual names from your `.env`
            3. Verify no functionality is broken
            4. Approve and merge only after full review

            ---
            *Security OS Bot — Response Layer | Run `${{ github.run_id }}`*
          labels: |
            security
            automated-fix
            human-review-required
          draft: false

  # ─────────────────────────────────────────
  # R-4: PR Comment (MEDIUM findings)
  # ─────────────────────────────────────────
  comment-on-pr:
    name: "R-4 | PR Comment (Medium)"
    runs-on: ubuntu-latest
    needs: resolve-context
    if: |
      needs.resolve-context.outputs.action_required == 'pr_comment' &&
      github.event.pull_request.number != ''
    steps:
      - name: Post security comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🟡 Security OS — Medium Findings Detected

            | Field | Value |
            |-------|-------|
            | Risk Level | MEDIUM |
            | Risk Score | ${{ needs.resolve-context.outputs.risk_score }} |
            | Action | Review recommended |

            Medium-severity findings were detected in this PR.
            No blocking action required, but please review before merging.

            [View Full Scan Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ needs.resolve-context.outputs.source_run_id }})

            ---
            *Security OS — Response Layer*
