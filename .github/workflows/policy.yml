name: "🏛️ Governance Layer — Security OS"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"  # 毎週月曜 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  # ─────────────────────────────────────────
  # G-1: Branch Protection Validation
  # ─────────────────────────────────────────
  branch-protection-check:
    name: "G-1 | Branch Protection Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Check main branch protection rules
        id: bp_check
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/branches/main/protection")

          cat response.json

          if [ "$RESPONSE" = "200" ]; then
            ENFORCE_ADMINS=$(jq -r '.enforce_admins.enabled // false' response.json)
            REQUIRE_REVIEW=$(jq -r '.required_pull_request_reviews.require_code_owner_reviews // false' response.json)
            DISMISS_STALE=$(jq -r '.required_pull_request_reviews.dismiss_stale_reviews // false' response.json)
            REQUIRED_COUNT=$(jq -r '.required_pull_request_reviews.required_approving_review_count // 0' response.json)
            REQUIRE_STATUS=$(jq -r '.required_status_checks.strict // false' response.json)

            echo "enforce_admins=$ENFORCE_ADMINS" >> $GITHUB_OUTPUT
            echo "require_review=$REQUIRE_REVIEW" >> $GITHUB_OUTPUT
            echo "dismiss_stale=$DISMISS_STALE" >> $GITHUB_OUTPUT
            echo "required_count=$REQUIRED_COUNT" >> $GITHUB_OUTPUT
            echo "require_status=$REQUIRE_STATUS" >> $GITHUB_OUTPUT
            echo "protection_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Branch protection API returned: $RESPONSE"
            echo "protection_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Evaluate policy compliance
        id: policy
        run: |
          VIOLATIONS=()
          PASS=true

          # Rule 1: Branch protection must exist
          if [ "${{ steps.bp_check.outputs.protection_exists }}" != "true" ]; then
            VIOLATIONS+=("CRITICAL: Branch protection not configured on main")
            PASS=false
          fi

          # Rule 2: PR reviews required
          COUNT="${{ steps.bp_check.outputs.required_count }}"
          if [ -z "$COUNT" ] || [ "$COUNT" = "0" ] || [ "$COUNT" = "null" ]; then
            VIOLATIONS+=("HIGH: No required PR reviewers set on main")
            PASS=false
          fi

          # Rule 3: Stale reviews dismissed
          if [ "${{ steps.bp_check.outputs.dismiss_stale }}" != "true" ]; then
            VIOLATIONS+=("MEDIUM: Stale review dismissal not enabled")
          fi

          # Rule 4: Status checks required
          if [ "${{ steps.bp_check.outputs.require_status }}" != "true" ]; then
            VIOLATIONS+=("MEDIUM: Required status checks not strict")
          fi

          # Output results
          echo "pass=$PASS" >> $GITHUB_OUTPUT
          printf '%s\n' "${VIOLATIONS[@]}" > violations.txt
          echo "violation_count=${#VIOLATIONS[@]}" >> $GITHUB_OUTPUT

          echo "## 🏛️ Branch Protection Policy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$PASS" = "true" ]; then
            echo "✅ All critical policies satisfied" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Policy violations detected:" >> $GITHUB_STEP_SUMMARY
            printf '- %s\n' "${VIOLATIONS[@]}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload violation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-violations-${{ github.run_id }}
          path: violations.txt
          retention-days: 90
          if-no-files-found: ignore

      - name: Create issue for policy violations
        if: steps.policy.outputs.pass == 'false' && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🏛️ [Governance] Branch Protection Policy Violation — ${{ github.run_id }}"
          content-filepath: violations.txt
          labels: |
            security
            governance
            policy-violation

  # ─────────────────────────────────────────
  # G-2: Workflow Permissions Audit
  # ─────────────────────────────────────────
  permissions-audit:
    name: "G-2 | Workflow Permissions Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit workflow permissions
        run: |
          echo "## 🔐 Workflow Permissions Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Permissions | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|--------|" >> $GITHUB_STEP_SUMMARY

          VIOLATIONS=0
          for wf in .github/workflows/*.yml; do
            [ -f "$wf" ] || continue
            WF_NAME=$(basename "$wf")

            # Check for write-all permissions
            if grep -q "permissions: write-all" "$wf" 2>/dev/null; then
              echo "| $WF_NAME | write-all | ❌ VIOLATION |" >> $GITHUB_STEP_SUMMARY
              VIOLATIONS=$((VIOLATIONS + 1))
            elif grep -q "permissions:" "$wf" 2>/dev/null; then
              echo "| $WF_NAME | scoped | ✅ OK |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $WF_NAME | default | ⚠️ REVIEW |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total violations: $VIOLATIONS" >> $GITHUB_STEP_SUMMARY

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::warning::$VIOLATIONS workflow(s) use write-all permissions. Review required."
          fi

      - name: Scan for secret leakage in workflows
        run: |
          echo "Scanning workflows for potential secret leakage patterns..."
          ISSUES=0
          for wf in .github/workflows/*.yml; do
            [ -f "$wf" ] || continue

            # Detect echo of secret values
            if grep -nP 'echo\s+\$\{\{.*secrets\.' "$wf" 2>/dev/null; then
              echo "::error file=$wf::Potential secret leakage via echo detected"
              ISSUES=$((ISSUES + 1))
            fi

            # Detect run: env printing
            if grep -nP "env\s*\|" "$wf" 2>/dev/null | grep -qi "secret"; then
              echo "::warning file=$wf::Possible secret in env output"
              ISSUES=$((ISSUES + 1))
            fi
          done

          if [ "$ISSUES" -eq 0 ]; then
            echo "✅ No secret leakage patterns found in workflows"
          else
            echo "⚠️ $ISSUES potential issues found"
          fi

  # ─────────────────────────────────────────
  # G-3: CODEOWNERS & Security Policy Check
  # ─────────────────────────────────────────
  security-docs-check:
    name: "G-3 | Security Policy & CODEOWNERS"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required security files
        run: |
          echo "## 📄 Security Documentation Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          REQUIRED_FILES=(
            "SECURITY.md"
            ".github/CODEOWNERS"
            ".github/dependabot.yml"
          )

          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "| \`$f\` | ✅ Present |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$f\` | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ $MISSING required file(s) missing. Run scaffolding to create them." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Auto-scaffold missing security files
        run: |
          # SECURITY.md
          if [ ! -f "SECURITY.md" ]; then
            cat > SECURITY.md << 'SECEOF'
          # Security Policy

          ## Supported Versions

          | Version | Supported |
          |---------|-----------|
          | main    | ✅        |

          ## Reporting a Vulnerability

          Please **do not** create a public GitHub issue for security vulnerabilities.

          Report vulnerabilities privately via GitHub Security Advisories:
          https://github.com/ShinnosukeMoriFukuokaJP/Iizuka-LinkedIn-Network-Repository-Structure/security/advisories/new

          We aim to respond within **72 hours**.

          ## Security Controls

          This repository is protected by Security OS:
          - Automated secret detection (Gitleaks)
          - Static analysis (Semgrep)
          - Dependency scanning (Dependabot)
          - Branch protection enforcement
          - Audit logging (90-day retention)
          SECEOF
            echo "✅ Created SECURITY.md"
          fi

          # .github/CODEOWNERS
          mkdir -p .github
          if [ ! -f ".github/CODEOWNERS" ]; then
            cat > .github/CODEOWNERS << 'COEOF'
          # Security OS — CODEOWNERS
          # All changes require owner approval

          *                                   @ShinnosukeMoriFukuokaJP
          .github/workflows/                  @ShinnosukeMoriFukuokaJP
          SECURITY.md                         @ShinnosukeMoriFukuokaJP
          COEOF
            echo "✅ Created .github/CODEOWNERS"
          fi

          # .github/dependabot.yml
          if [ ! -f ".github/dependabot.yml" ]; then
            cat > .github/dependabot.yml << 'DEPEOF'
          version: 2
          updates:
            - package-ecosystem: "github-actions"
              directory: "/"
              schedule:
                interval: "weekly"
                day: "monday"
                time: "09:00"
                timezone: "Asia/Tokyo"
              open-pull-requests-limit: 5
              labels:
                - "dependencies"
                - "security"
              commit-message:
                prefix: "chore(deps)"

            - package-ecosystem: "npm"
              directory: "/"
              schedule:
                interval: "weekly"
              open-pull-requests-limit: 5
              labels:
                - "dependencies"
                - "security"
              ignore:
                - dependency-name: "*"
                  update-types: ["version-update:semver-patch"]
          DEPEOF
            echo "✅ Created .github/dependabot.yml"
          fi

      - name: Upload scaffolded files
        uses: actions/upload-artifact@v4
        with:
          name: scaffolded-security-files-${{ github.run_id }}
          path: |
            SECURITY.md
            .github/CODEOWNERS
            .github/dependabot.yml
          retention-days: 30
          if-no-files-found: ignore

  # ─────────────────────────────────────────
  # G-4: Governance Summary
  # ─────────────────────────────────────────
  governance-summary:
    name: "G-4 | Governance Report"
    runs-on: ubuntu-latest
    needs: [branch-protection-check, permissions-audit, security-docs-check]
    if: always()
    steps:
      - name: Write final governance report
        run: |
          cat > governance-report.json << EOF
          {
            "run_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "jobs": {
              "branch_protection": "${{ needs.branch-protection-check.result }}",
              "permissions_audit": "${{ needs.permissions-audit.result }}",
              "security_docs": "${{ needs.security-docs-check.result }}"
            },
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}"
          }
          EOF

      - name: Upload governance report
        uses: actions/upload-artifact@v4
        with:
          name: governance-report-${{ github.run_id }}
          path: governance-report.json
          retention-days: 90
