# =============================================================
# security-scan.yml
# Self-Healing DevSecOps Pipeline — Phase 1: DETECT
# Gitleaks + Semgrep + Nuclei による自動脆弱性スキャン
# Triggers: push to main, daily schedule, manual
# =============================================================
name: 🔍 Security Scan (Detect Phase)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'dependabot/**'
  schedule:
    # 毎日 02:00 JST (17:00 UTC) に実行
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      scan_depth:
        description: 'Scan depth: quick | full'
        required: false
        default: 'full'

# 最小権限原則
permissions:
  contents: read
  security-events: write
  issues: write

env:
  SCAN_RESULTS_DIR: /tmp/scan-results
  # Nucleiスキャン対象（GitHub Pages URL）
  TARGET_URL: "https://shinnosukemoriFukuokaJP.github.io/lizuka-LinkedIn-Network-Repository-Structure"

jobs:

  # ─────────────────────────────────────────
  # 🔒 OWNER-ONLY LOCK — 所有者以外は即時停止
  # ─────────────────────────────────────────
  owner-check:
    name: 🔒 Owner Identity Verification
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.verify.outputs.authorized }}
    steps:
      - name: Verify actor is repository owner
        id: verify
        env:
          REQUIRED_OWNER: "ShinnosukeMoriFukuokaJP"
        run: |
          ACTOR="${{ github.actor }}"
          REPO_OWNER="${{ github.repository_owner }}"

          echo "Actor     : $ACTOR"
          echo "Repo owner: $REPO_OWNER"
          echo "Required  : $REQUIRED_OWNER"

          # スケジュール実行はActorが github-actions[bot] になる
          # そのためリポジトリオーナーで最終判定
          if [ "$ACTOR" != "$REQUIRED_OWNER" ] && \
             [ "$ACTOR" != "github-actions[bot]" ]; then
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "::warning::🚫 UNAUTHORIZED: $ACTOR is not allowed to run this workflow."
            exit 0
          fi

          if [ "$REPO_OWNER" != "$REQUIRED_OWNER" ]; then
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "::warning::🚫 UNAUTHORIZED: Repository owner $REPO_OWNER is not $REQUIRED_OWNER"
            exit 0
          fi

          echo "authorized=true" >> $GITHUB_OUTPUT
          echo "✅ Authorization passed for $ACTOR"

  # ─────────────────────────────────────────
  # JOB 1: Gitleaks — Secrets / Credentials 検出
  # ─────────────────────────────────────────
  scan-secrets:
    name: 🔑 Gitleaks Secret Detection
    needs: [owner-check]
    if: needs.owner-check.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository (full history for secret scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全コミット履歴をスキャン

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # カスタム設定ファイルがある場合に有効化
          # GITLEAKS_CONFIG: .gitleaks.toml
        continue-on-error: true  # 検出があっても後続ジョブを継続

      - name: Save Gitleaks results
        if: always()
        run: |
          mkdir -p ${{ env.SCAN_RESULTS_DIR }}
          # gitleaks-action は SARIF を自動生成するが、
          # 追加で summary も保存
          cat << 'EOF' > ${{ env.SCAN_RESULTS_DIR }}/gitleaks-meta.json
          {
            "tool": "gitleaks",
            "exit_code": "${{ steps.gitleaks.outcome }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "${{ github.sha }}"
          }
          EOF

      - name: Upload Gitleaks SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results-${{ github.run_id }}
          path: |
            results.sarif
            ${{ env.SCAN_RESULTS_DIR }}/gitleaks-meta.json
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 2: Semgrep — Static Analysis (SAST)
  # ─────────────────────────────────────────
  scan-sast:
    name: 🔬 Semgrep Static Analysis
    needs: [owner-check]
    if: needs.owner-check.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          pip install semgrep --quiet

      - name: Create Semgrep config
        run: |
          mkdir -p ${{ env.SCAN_RESULTS_DIR }}
          cat << 'EOF' > /tmp/semgrep-config.yml
          rules:
            # ─── Secrets & Credentials ───────────────────
            - id: hardcoded-api-key
              patterns:
                - pattern: |
                    $KEY = "..."
                - metavariable-regex:
                    metavariable: $KEY
                    regex: '(?i)(api_key|apikey|api-key|secret|password|passwd|token|access_key)'
              message: "Hardcoded credential detected: $KEY"
              languages: [python, javascript, typescript, go, java, ruby]
              severity: ERROR
              metadata:
                category: security
                cwe: "CWE-798"
                fix_type: HIGH

            # ─── Dangerous Functions ──────────────────────
            - id: unsafe-eval-js
              pattern: eval($EXPR)
              message: "Unsafe eval() usage detected"
              languages: [javascript, typescript]
              severity: ERROR
              metadata:
                category: security
                cwe: "CWE-95"
                fix_type: HIGH

            - id: unsafe-exec-python
              patterns:
                - pattern: os.system($CMD)
                - pattern: subprocess.call($CMD, shell=True)
              message: "Unsafe shell execution detected"
              languages: [python]
              severity: ERROR
              metadata:
                category: security
                cwe: "CWE-78"
                fix_type: HIGH

            # ─── SQL Injection ────────────────────────────
            - id: sql-injection-python
              patterns:
                - pattern: |
                    $QUERY = "..." + $VAR
                - pattern: cursor.execute($QUERY)
              message: "Potential SQL injection via string concatenation"
              languages: [python]
              severity: ERROR
              metadata:
                category: security
                cwe: "CWE-89"
                fix_type: HIGH

            # ─── XSS Patterns ────────────────────────────
            - id: innerHTML-xss
              patterns:
                - pattern: $ELEM.innerHTML = $EXPR
              message: "Potential XSS via innerHTML assignment"
              languages: [javascript, typescript]
              severity: WARNING
              metadata:
                category: security
                cwe: "CWE-79"
                fix_type: MEDIUM

            # ─── Weak Crypto ──────────────────────────────
            - id: weak-hash-md5
              patterns:
                - pattern: hashlib.md5(...)
                - pattern: md5(...)
              message: "MD5 is cryptographically weak; use SHA-256 or stronger"
              languages: [python]
              severity: WARNING
              metadata:
                category: security
                cwe: "CWE-327"
                fix_type: MEDIUM

            # ─── Markdown / Config Injection ─────────────
            - id: yaml-nosec-disable
              pattern: '# nosec'
              message: "Security check bypass detected via nosec comment"
              languages: [python]
              severity: INFO
              metadata:
                category: security
                fix_type: LOW

            # ─── Debug / Sensitive Log ────────────────────
            - id: debug-flag-enabled
              patterns:
                - pattern: DEBUG = True
                - pattern: debug=True
              message: "Debug mode enabled in production code"
              languages: [python, javascript]
              severity: WARNING
              metadata:
                category: security
                cwe: "CWE-489"
                fix_type: MEDIUM
          EOF

      - name: Run Semgrep scan
        id: semgrep
        run: |
          # SARIF形式で出力（GitHub Code Scanningと統合）
          semgrep scan \
            --config /tmp/semgrep-config.yml \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --sarif \
            --output ${{ env.SCAN_RESULTS_DIR }}/semgrep-results.sarif \
            --json \
            --output /dev/null \
            --no-error \
            --quiet \
            . 2>/dev/null || true

          # JSON出力（自動修正フェーズで利用）
          semgrep scan \
            --config /tmp/semgrep-config.yml \
            --json \
            --output ${{ env.SCAN_RESULTS_DIR }}/semgrep-results.json \
            --no-error \
            --quiet \
            . 2>/dev/null || true

          echo "Semgrep scan complete"

      - name: Parse and classify findings
        id: classify
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          results_path = os.environ.get('SCAN_RESULTS_DIR', '/tmp/scan-results')
          json_file = f"{results_path}/semgrep-results.json"

          if not os.path.exists(json_file):
              print("No Semgrep results file found")
              with open(f"{results_path}/classified.json", 'w') as f:
                  json.dump({"CRITICAL": [], "HIGH": [], "MEDIUM": [], "LOW": []}, f)
              sys.exit(0)

          with open(json_file, 'r') as f:
              data = json.load(f)

          results = data.get('results', [])

          classified = {"CRITICAL": [], "HIGH": [], "MEDIUM": [], "LOW": []}

          severity_map = {
              "ERROR": "HIGH",
              "WARNING": "MEDIUM",
              "INFO": "LOW",
          }

          for r in results:
              sev = r.get('extra', {}).get('severity', 'INFO')
              fix_type = r.get('extra', {}).get('metadata', {}).get('fix_type', 'LOW')
              
              # fix_typeが明示されている場合はそちらを優先
              level = fix_type if fix_type in classified else severity_map.get(sev, 'LOW')
              
              classified[level].append({
                  "check_id": r.get('check_id', ''),
                  "path": r.get('path', ''),
                  "start_line": r.get('start', {}).get('line', 0),
                  "end_line": r.get('end', {}).get('line', 0),
                  "message": r.get('extra', {}).get('message', ''),
                  "code": r.get('extra', {}).get('lines', ''),
                  "cwe": r.get('extra', {}).get('metadata', {}).get('cwe', '')
              })

          with open(f"{results_path}/classified.json", 'w') as f:
              json.dump(classified, f, indent=2, ensure_ascii=False)

          total = sum(len(v) for v in classified.values())
          print(f"Classification complete: {total} findings")
          for level, items in classified.items():
              print(f"  {level}: {len(items)}")

          # GitHub Actions output
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"total_findings={total}\n")
              f.write(f"high_findings={len(classified['HIGH'])}\n")
              f.write(f"critical_findings={len(classified['CRITICAL'])}\n")
          PYEOF

      - name: Upload Semgrep SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.SCAN_RESULTS_DIR }}/semgrep-results.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload classified results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-${{ github.run_id }}
          path: ${{ env.SCAN_RESULTS_DIR }}/
          retention-days: 30

      - name: Comment scan summary on commit
        if: always() && steps.classify.outputs.total_findings != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = process.env.SCAN_RESULTS_DIR || '/tmp/scan-results';
            
            let classified = {};
            try {
              classified = JSON.parse(fs.readFileSync(`${resultsPath}/classified.json`, 'utf8'));
            } catch(e) {
              console.log('Could not read classified results:', e.message);
              return;
            }
            
            const total = Object.values(classified).reduce((s, arr) => s + arr.length, 0);
            if (total === 0) return;
            
            const emoji = classified.CRITICAL.length > 0 ? '🚨' : 
                          classified.HIGH.length > 0 ? '⚠️' : 'ℹ️';
            
            const body = `## ${emoji} Security Scan Results — Run #${{ github.run_number }}
            
            | Severity | Count |
            |----------|-------|
            | 🔴 CRITICAL | ${classified.CRITICAL.length} |
            | 🟠 HIGH | ${classified.HIGH.length} |
            | 🟡 MEDIUM | ${classified.MEDIUM.length} |
            | 🔵 LOW | ${classified.LOW.length} |
            
            **Total findings:** ${total}
            
            ${classified.HIGH.length > 0 ? '⚡ **Auto-fix workflow will be triggered for HIGH severity issues.**' : ''}
            ${classified.CRITICAL.length > 0 ? '🛑 **CRITICAL issues require immediate manual review.**' : ''}
            
            > Commit: \`${{ github.sha }}\` | [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: '${{ github.sha }}',
              body: body
            });

  # ─────────────────────────────────────────
  # JOB 3: Nuclei — External / DAST Scan
  # ─────────────────────────────────────────
  scan-external:
    name: 🌐 Nuclei External Scan
    needs: [owner-check]
    if: needs.owner-check.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
        env:
          GOPATH: $HOME/go

      - name: Update Nuclei templates
        run: |
          nuclei -update-templates -silent || true

      - name: Run Nuclei scan
        id: nuclei
        run: |
          mkdir -p ${{ env.SCAN_RESULTS_DIR }}
          
          # GitHub Pages URLが有効かチェック
          TARGET="${{ env.TARGET_URL }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET" --max-time 10 || echo "000")
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "Target accessible (HTTP $HTTP_CODE), running full scan"
            
            nuclei \
              -target "$TARGET" \
              -tags "cve,exposure,misconfiguration,info,technology" \
              -severity "critical,high,medium" \
              -rate-limit 10 \
              -timeout 10 \
              -retries 1 \
              -json-export ${{ env.SCAN_RESULTS_DIR }}/nuclei-results.json \
              -silent \
              -no-color \
              2>/dev/null || true
              
            echo "nuclei_ran=true" >> $GITHUB_OUTPUT
          else
            echo "Target not accessible (HTTP $HTTP_CODE), skipping external scan"
            echo '[]' > ${{ env.SCAN_RESULTS_DIR }}/nuclei-results.json
            echo "nuclei_ran=false" >> $GITHUB_OUTPUT
          fi

      - name: Parse Nuclei results
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os

          results_path = os.environ.get('SCAN_RESULTS_DIR', '/tmp/scan-results')
          json_file = f"{results_path}/nuclei-results.json"

          findings = []
          try:
              with open(json_file, 'r') as f:
                  content = f.read().strip()
                  if content == '[]' or not content:
                      print("No Nuclei findings")
                  else:
                      # Nuclei outputs JSONL (one JSON per line)
                      for line in content.split('\n'):
                          if line.strip():
                              try:
                                  findings.append(json.loads(line))
                              except:
                                  pass
          except Exception as e:
              print(f"Error reading Nuclei results: {e}")

          summary = {
              "total": len(findings),
              "by_severity": {},
              "findings": []
          }

          for f in findings:
              sev = f.get('info', {}).get('severity', 'info').upper()
              summary["by_severity"][sev] = summary["by_severity"].get(sev, 0) + 1
              summary["findings"].append({
                  "template_id": f.get('template-id', ''),
                  "name": f.get('info', {}).get('name', ''),
                  "severity": sev,
                  "url": f.get('matched-at', ''),
                  "description": f.get('info', {}).get('description', '')
              })

          with open(f"{results_path}/nuclei-summary.json", 'w') as f:
              json.dump(summary, f, indent=2)

          print(f"Nuclei scan: {len(findings)} findings")
          for sev, count in summary["by_severity"].items():
              print(f"  {sev}: {count}")
          PYEOF

      - name: Upload Nuclei results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-results-${{ github.run_id }}
          path: ${{ env.SCAN_RESULTS_DIR }}/
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: 統合サマリー & Issue作成
  # ─────────────────────────────────────────
  summarize-and-alert:
    name: 📊 Summarize & Alert
    runs-on: ubuntu-latest
    needs: [owner-check, scan-secrets, scan-sast, scan-external]
    if: needs.owner-check.outputs.authorized == 'true' && always()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results-${{ github.run_id }}'
          merge-multiple: true
          path: /tmp/all-results/

      - name: Generate consolidated report & create Issue if needed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // 分類結果を読み込み
            let classified = { CRITICAL: [], HIGH: [], MEDIUM: [], LOW: [] };
            let nucleiSummary = { total: 0, by_severity: {}, findings: [] };
            
            try {
              const classifiedPath = path.join('/tmp/all-results', 'classified.json');
              if (fs.existsSync(classifiedPath)) {
                classified = JSON.parse(fs.readFileSync(classifiedPath, 'utf8'));
              }
            } catch(e) { console.log('No Semgrep classified data'); }
            
            try {
              const nucleiPath = path.join('/tmp/all-results', 'nuclei-summary.json');
              if (fs.existsSync(nucleiPath)) {
                nucleiSummary = JSON.parse(fs.readFileSync(nucleiPath, 'utf8'));
              }
            } catch(e) { console.log('No Nuclei summary data'); }
            
            const totalSast = Object.values(classified).reduce((s, a) => s + a.length, 0);
            const totalAll = totalSast + nucleiSummary.total;
            
            if (totalAll === 0) {
              console.log('✅ No findings — skipping issue creation');
              return;
            }
            
            // CRITICAL または HIGHがある場合のみIssue作成
            const needsIssue = classified.CRITICAL.length > 0 || classified.HIGH.length > 0 ||
              (nucleiSummary.by_severity['CRITICAL'] || 0) > 0 ||
              (nucleiSummary.by_severity['HIGH'] || 0) > 0;
            
            if (!needsIssue) {
              console.log('No CRITICAL/HIGH findings — skipping issue creation');
              return;
            }
            
            const now = new Date().toISOString();
            const issueBody = `## 🚨 Security Scan Alert — ${now}
            
            ### 📊 Summary
            
            | Source | CRITICAL | HIGH | MEDIUM | LOW |
            |--------|----------|------|--------|-----|
            | Semgrep (SAST) | ${classified.CRITICAL.length} | ${classified.HIGH.length} | ${classified.MEDIUM.length} | ${classified.LOW.length} |
            | Nuclei (DAST) | ${nucleiSummary.by_severity['CRITICAL']||0} | ${nucleiSummary.by_severity['HIGH']||0} | ${nucleiSummary.by_severity['MEDIUM']||0} | ${nucleiSummary.by_severity['INFO']||0} |
            
            ### 🔴 CRITICAL Issues (Manual fix required)
            ${classified.CRITICAL.length === 0 ? '_None_' : 
              classified.CRITICAL.map(f => `- \`${f.path}:${f.start_line}\` — ${f.message}`).join('\n')}
            
            ### 🟠 HIGH Issues (Auto-fix PR will be created)
            ${classified.HIGH.length === 0 ? '_None_' : 
              classified.HIGH.map(f => `- \`${f.path}:${f.start_line}\` — ${f.message}`).join('\n')}
            
            ---
            
            > **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            > **Commit:** \`${{ github.sha }}\`
            
            _このIssueはauto-fix.ymlによる自動修正PRが作成されると自動クローズされます_`;
            
            // 既存のオープンなセキュリティIssueを検索
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open'
            });
            
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 [Security Alert] ${classified.CRITICAL.length + classified.HIGH.length} Critical/High findings — ${now.split('T')[0]}`,
                body: issueBody,
                labels: ['security', 'automated', 'needs-review']
              });
              console.log('Security issue created');
            } else {
              // 既存Issueにコメント追加
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `## 🔄 Updated Scan Results — ${now}\n\n${issueBody}`
              });
              console.log('Updated existing security issue');
            }
