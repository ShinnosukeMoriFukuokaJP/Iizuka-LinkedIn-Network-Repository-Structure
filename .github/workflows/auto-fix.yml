name: Auto-Fix and PR Generator

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_scan:
        description: 'Force re-scan before fixing'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  security-events: read
  issues: write

env:
  FIX_BRANCH_PREFIX: "security/auto-fix"
  SCAN_RESULTS_DIR: /tmp/scan-results

jobs:

  owner-check:
    name: Owner Identity Verification
    runs-on: ubuntu-latest
    if: |
      github.actor == 'ShinnosukeMoriFukuokaJP' ||
      github.actor == 'github-actions[bot]'
    outputs:
      authorized: ${{ steps.verify.outputs.authorized }}
    steps:
      - name: Verify actor is repository owner
        id: verify
        env:
          REQUIRED_OWNER: "ShinnosukeMoriFukuokaJP"
        run: |
          ACTOR="${{ github.actor }}"
          REPO_OWNER="${{ github.repository_owner }}"
          echo "Actor     : $ACTOR"
          echo "Repo owner: $REPO_OWNER"
          if [ "$REPO_OWNER" != "$REQUIRED_OWNER" ]; then
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "::warning::SKIPPED: Repo owner mismatch."
            exit 0
          fi
          echo "authorized=true" >> $GITHUB_OUTPUT
          echo "Authorization passed for $ACTOR"

  prepare-fix:
    name: Prepare Fix Context
    runs-on: ubuntu-latest
    needs: [owner-check]
    if: needs.owner-check.outputs.authorized == 'true'
    outputs:
      has_fixable: ${{ steps.check.outputs.has_fixable }}
      fix_count: ${{ steps.check.outputs.fix_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep --quiet
      - name: Run Semgrep scan
        run: |
          mkdir -p ${{ env.SCAN_RESULTS_DIR }}
          semgrep scan --config "p/owasp-top-ten" --config "p/secrets" \
            --json --output ${{ env.SCAN_RESULTS_DIR }}/semgrep.json \
            --no-error --quiet . 2>/dev/null || true
      - name: Classify and check fixable
        id: check
        run: |
          python3 << 'PYEOF2'
          import json, os
          p = os.environ.get('SCAN_RESULTS_DIR', '/tmp/scan-results')
          try:
              with open(f"{p}/semgrep.json") as f: data = json.load(f)
          except:
              data = {"results": []}
          smap = {"ERROR": "HIGH", "WARNING": "MEDIUM", "INFO": "LOW"}
          cl = {"CRITICAL": [], "HIGH": [], "MEDIUM": [], "LOW": []}
          for r in data.get('results', []):
              sev = r.get('extra', {}).get('severity', 'INFO')
              cl[smap.get(sev, 'LOW')].append({
                  "path": r.get('path', ''),
                  "check_id": r.get('check_id', ''),
                  "start_line": r.get('start', {}).get('line', 0),
                  "message": r.get('extra', {}).get('message', '')
              })
          with open(f"{p}/classified.json", 'w') as f:
              json.dump(cl, f, indent=2)
          high = cl.get('HIGH', [])
          fixable = [f for f in high if any(
              f.get('path', '').endswith(e) for e in ['.py', '.js', '.ts', '.yml', '.yaml']
          )]
          out = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(out, 'a') as f:
              f.write(f"has_fixable={'true' if fixable else 'false'}\n")
              f.write(f"fix_count={len(fixable)}\n")
          print(f"Fixable HIGH: {len(fixable)} / Total: {sum(len(v) for v in cl.values())}")
          PYEOF2

  auto-fix-and-pr:
    name: Auto-Fix Engine and PR Creator
    runs-on: ubuntu-latest
    needs: [owner-check, prepare-fix]
    if: needs.owner-check.outputs.authorized == 'true' && needs.prepare-fix.outputs.has_fixable == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git
        run: |
          git config user.name "Security Bot [Auto-Fix]"
          git config user.email "security-bot@github-actions.local"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep --quiet
      - name: Create fix branch
        id: branch
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="${{ env.FIX_BRANCH_PREFIX }}-${TIMESTAMP}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
      - name: Run auto-fix engine
        id: fix-engine
        run: |
          mkdir -p ${{ env.SCAN_RESULTS_DIR }}
          semgrep scan --config "p/owasp-top-ten" --config "p/secrets" \
            --json --output ${{ env.SCAN_RESULTS_DIR }}/semgrep.json \
            --no-error --quiet . 2>/dev/null || true
          python3 << 'PYEOF2'
          import json, os, re
          FIX_RULES = {
              'eval':   {'pat': re.compile(r'\beval\s*\('), 'rep': lambda m: '/* SECURITY: eval() removed */(', 'desc': 'Replaced unsafe eval()'},
              'md5':    {'pat': re.compile(r'hashlib\.md5\s*\('), 'rep': lambda m: 'hashlib.sha256(', 'desc': 'MD5 replaced with SHA-256'},
              'debug':  {'pat': re.compile(r'\bDEBUG\s*=\s*True\b'), 'rep': lambda m: 'DEBUG = False  # SECURITY', 'desc': 'Debug disabled'},
          }
          p = os.environ.get('SCAN_RESULTS_DIR', '/tmp/scan-results')
          try:
              with open(f"{p}/semgrep.json") as f: data = json.load(f)
          except:
              data = {"results": []}
          modified = set()
          fix_log = []
          smap = {"ERROR": "HIGH", "WARNING": "MEDIUM", "INFO": "LOW"}
          for r in data.get('results', []):
              fp = r.get('path', '')
              if not fp or not os.path.exists(fp): continue
              if not any(fp.endswith(e) for e in ['.py', '.js', '.ts']): continue
              sev = r.get('extra', {}).get('severity', 'INFO')
              if smap.get(sev, 'LOW') != 'HIGH': continue
              try:
                  with open(fp) as f: orig = f.read()
                  for rid, rule in FIX_RULES.items():
                      fixed = rule['pat'].sub(rule['rep'], orig, count=10)
                      if fixed != orig:
                          with open(fp, 'w') as f: f.write(fixed)
                          modified.add(fp)
                          fix_log.append({'file': fp, 'rule': rid, 'desc': rule['desc']})
                          print(f"Fixed: {fp} ({rid})")
              except Exception as e:
                  print(f"Error: {e}")
          result = {'modified_files': list(modified), 'fix_count': len(fix_log), 'fix_log': fix_log}
          with open(f"{p}/fix-result.json", 'w') as f: json.dump(result, f, indent=2)
          out = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(out, 'a') as f:
              f.write(f"fix_count={len(fix_log)}\n")
              f.write(f"has_fixes={'true' if modified else 'false'}\n")
          print(f"Done: {len(fix_log)} fixes in {len(modified)} files")
          PYEOF2
      - name: Commit fixes
        id: commit
        if: steps.fix-engine.outputs.has_fixes == 'true'
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "security: auto-fix HIGH severity vulnerabilities [$(date +%Y%m%d)]

          Automated Security Fix - Self-Healing DevSecOps Pipeline
          OWNER-ONLY: ShinnosukeMoriFukuokaJP
          WARNING: Human review required. Auto-merge prohibited."
            echo "committed=true" >> $GITHUB_OUTPUT
          fi
      - name: Push branch
        if: steps.commit.outputs.committed == 'true'
        run: git push origin "${{ steps.branch.outputs.branch }}"
      - name: Create Pull Request
        if: steps.commit.outputs.committed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let fixResult = {fix_count: 0, fix_log: []};
            try {
              fixResult = JSON.parse(fs.readFileSync('${{ env.SCAN_RESULTS_DIR }}/fix-result.json', 'utf8'));
            } catch(e) {}
            const now = new Date().toISOString();
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security Auto-Fix] ${fixResult.fix_count} HIGH vulnerabilities patched - ${now.split('T')[0]}`,
              body: `## Automated Security Fix PR\n\n> **OWNER-ONLY: ShinnosukeMoriFukuokaJP専用**\n> **Auto-merge PROHIBITED — Human review required**\n\n### Applied Fixes\n${fixResult.fix_log.map(f => \`- \\`\${f.file}\\` - \${f.desc}\`).join('\n') || 'See diff'}\n\n> Run: ${{ github.run_id }} | Commit: \`${{ github.sha }}\``,
              head: '${{ steps.branch.outputs.branch }}',
              base: 'main',
              draft: false
            });
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['security', 'automated', 'auto-fix', 'needs-review']
              });
            } catch(e) {}
            console.log(`PR #${pr.data.number}: ${pr.data.html_url}`);

  critical-alert:
    name: Critical Alert Handler
    runs-on: ubuntu-latest
    needs: [owner-check, prepare-fix]
    if: always() && (needs.owner-check.outputs.authorized == 'true')
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semgrep-results-${{ github.run_id }}
          path: ${{ env.SCAN_RESULTS_DIR }}
        continue-on-error: true
      - name: Check for CRITICAL findings
        id: check-critical
        continue-on-error: true
        run: |
          python3 << 'PYEOF2'
          import json, os, sys
          p = os.environ.get('SCAN_RESULTS_DIR', '/tmp/scan-results')
          cl = {'CRITICAL': []}
          try:
              if os.path.exists(f"{p}/classified.json"):
                  with open(f"{p}/classified.json") as f:
                      cl = json.load(f)
          except Exception as e:
              print(f"Warning: {e}")
          critical = cl.get('CRITICAL', [])
          out = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(out, 'a') as f:
              f.write(f"has_critical={'true' if critical else 'false'}\n")
          print(f"CRITICAL findings: {len(critical)}")
          PYEOF2
      - name: Create CRITICAL issue
        if: steps.check-critical.outputs.has_critical == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'CRITICAL Security Alert - Immediate Action Required',
              body: '## CRITICAL Security Alert\n\nAuto-fix is NOT available for CRITICAL findings.\nImmediate manual intervention required.\n\n> Run: ${{ github.run_id }}',
              labels: ['security', 'critical', 'needs-review']
            });
